input {
  file {
    id => "raw_log_input"
    path => [
      "/usr/share/logstash/uploads/raw/*",
      "/usr/share/logstash/uploads/raw/**/*"
    ]
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb"
    mode => "read"
    discover_interval => 5
    stat_interval => 1

    codec => multiline {
      pattern => "^[A-Z][a-z]{2} \\d{1,2}, \\d{4} \\d{2}:\\d{2}:\\d{2}:\\d{3} \\|"
      negate => true
      what => "previous"
      auto_flush_interval => 1
    }
  }
}

filter {
  mutate {
    gsub => [ "message", "\r", "" ]
    add_field => {
      "application_name" => ""
      "application_key" => "unknown"
      "application_group" => "unknown"

      "log_level" => ""
      "log_origin" => ""
      "thread" => ""
      "context" => ""
      "details" => ""

      "log_family" => "unknown"
      "event_type" => "generic"

      "controller_name" => ""
      "method_name" => ""
      "method_display_name" => ""
      "criterion" => ""
      "worker_id" => ""
      "service_domain" => ""

      "error_message" => ""
      "exception_class" => ""
      "root_exception_class" => ""
      "stack_trace" => ""
      "error_keyword" => ""

      "query_stage" => ""
      "query_text" => ""
      "sql_operation" => ""
      "sql_table" => ""
      "data_source" => ""
      "main_entity_id" => ""
      "sql_entity_family" => ""

      "analysis_status" => "non_analyse"
      "source_file" => ""
      "parse_status" => "parsed"
      "parse_confidence" => "high"
      "schema_version" => "v1"
    }
  }

  dissect {
    mapping => {
      "message" => "%{log_month} %{log_day}, %{log_year} %{log_hour}:%{log_minute}:%{log_second}:%{log_millis} | 
      %{application_name} : %{log_level} | %{origin_and_thread}: %{payload}"
    }
    tag_on_failure => ["header_parse_failed"]
  }
  if "header_parse_failed" not in [tags] {
    mutate {
      replace => { "log_origin" => "%{origin_and_thread}" }
    }
  }
  if "header_parse_failed" in [tags] {
    mutate {
      replace => {
        "parse_status" => "partial"
        "parse_confidence" => "low"
      }
    }
  }
  if [log_month] != "" {
    mutate {
      add_field => {
        "log_timestamp_raw" => "%{log_month} %{log_day}, %{log_year} %{log_hour}:%{log_minute}:%{log_second}:%{log_millis}"
      }
    }
    date {
      match => [ "log_timestamp_raw", "MMM d, yyyy HH:mm:ss:SSS", "MMM dd, yyyy HH:mm:ss:SSS" ]
      target => "@timestamp"
    }
    mutate {
      lowercase => [ "log_level" ]
      strip => [ "application_name", "log_origin", "thread", "payload" ]
    }
  }
  if [application_name] == "" {
    mutate {
      replace => { "application_name" => "unknown_application" }
    }
  }

  ruby {
    code => '
      app = event.get("application_name")
      if app
        key = app.downcase.strip.gsub(/[^a-z0-9]+/, "_").gsub(/^_+|_+$/, "")
        key = "unknown" if key.empty?
        event.set("application_key", key)

        group = "generic_application"
        if app =~ /scheduler|controller/i
          group = "scheduler_controller"
        elsif app =~ /sql|persistence|hibernate|jdbc|database/i
          group = "sql_persistence"
        elsif app =~ /batch|job|worker/i
          group = "batch_processing"
        elsif app =~ /api|service|backend/i
          group = "service_api"
        elsif app =~ /web|portal|ui|front/i
          group = "web_application"
        end

        event.set("application_group", group)
      end
    '
  }

  grok {
    match => {
      "payload" => "^(?<context>[^:]+:[^:]+):\\s*(?<details_body>(?m:.*))$"
    }
    tag_on_failure => []
  }

  if [details_body] != "" {
    mutate { replace => { "details" => "%{details_body}" } }
  } else if [payload] != "" {
    mutate { replace => { "details" => "%{payload}" } }
  } else {
    mutate { replace => { "details" => "%{message}" } }
  }

  mutate {
    strip => [ "context", "details" ]
    replace => { "source_file" => "%{[log][file][path]}" }
  }

  #
  # Error branch first: errors should dominate other classifications
  #
  if (([log_level] == "error") or ([details] =~ /(?m)^Caused by:/) or ([details] =~ /Exception/)) {
    mutate {
      replace => {
        "log_family" => "application_error"
        "event_type" => "error"
      }
    }

    grok {
      match => {
        "details" => [
          "^(?<error_message>[^\n]+)\n(?<stack_trace>(?m:.*))$",
          "^(?<error_message>.*)$"
        ]
      }
      tag_on_failure => []
    }

    grok {
      match => {
        "stack_trace" => [
          "(?m)^%{JAVACLASS:exception_class}:",
          "(?m)^Caused by:\\s*%{JAVACLASS:root_exception_class}:"
        ]
      }
      tag_on_failure => []
    }

    if [exception_class] == "" {
      grok {
        match => { "error_message" => "^(?<exception_class>%{JAVACLASS})(?::|\\s|$)" }
        tag_on_failure => []
      }
    }

    ruby {
      code => '
        stack = event.get("stack_trace")
        if stack
          count = stack.scan(/Caused by:/).length
          event.set("caused_by_count", count)
        end
      '
    }

    if (([error_message] =~ /(?i)well-formed document/) or ([stack_trace] =~ /(?i)XMLStreamException/)) {
      mutate { replace => { "error_keyword" => "xml_parsing_error" } }
    } else if ([error_message] =~ /(?i)database/) {
      mutate { replace => { "error_keyword" => "database_error" } }
    } else if ([error_message] =~ /(?i)timeout/) {
      mutate { replace => { "error_keyword" => "timeout_error" } }
    } else if ([error_message] =~ /(?i)security/) {
      mutate { replace => { "error_keyword" => "security_error" } }
    }

    mutate {
      strip => [ "error_message", "exception_class", "root_exception_class", "stack_trace", "error_keyword" ]
    }
  }

  #
  # Scheduler / controller
  #
  else if [details] =~ /the controller name is\s*:/ {
    mutate {
      replace => {
        "log_family" => "scheduler_controller"
        "event_type" => "controller_call"
      }
    }

    grok {
      match => {
        "details" => "^_*?\\s*the controller name is\\s*:\\s*%{DATA:controller_name}\\s*the called method name is\\s*:\\s*%{DATA:method_name}(?:\\s*the called method Display name is\\s*:\\s*%{DATA:method_display_name})?.*$"
      }
      tag_on_failure => []
    }

    mutate {
      strip => [ "controller_name", "method_name", "method_display_name" ]
    }
  }

  else if [details] =~ /^The criterion is:/ {
    mutate {
      replace => {
        "log_family" => "scheduler_controller"
        "event_type" => "criterion"
      }
    }

    grok {
      match => { "details" => "^The criterion is:\\s*%{GREEDYDATA:criterion}$" }
      tag_on_failure => []
    }

    mutate { strip => [ "criterion" ] }
  }

  #
  # SQL branches
  #
  else if [details] =~ /^The query before setting its parameters:/ {
    mutate {
      replace => {
        "log_family" => "sql_persistence"
        "event_type" => "sql_before"
      }
    }

    grok {
      match => {
        "details" => [
          "^(?<query_stage>The query before setting its parameters):\\s*\n(?<query_text>(?m:.*))$",
          "^(?<query_stage>The query before setting its parameters):\\s*(?<query_text>(?m:.*))$"
        ]
      }
      tag_on_failure => []
    }
  }

  else if [details] =~ /^The query after setting its parameters:/ {
    mutate {
      replace => {
        "log_family" => "sql_persistence"
        "event_type" => "sql_after"
      }
    }

    grok {
      match => {
        "details" => [
          "^(?<query_stage>The query after setting its parameters):\\s*\n(?<query_text>(?m:.*))$",
          "^(?<query_stage>The query after setting its parameters):\\s*(?<query_text>(?m:.*))$"
        ]
      }
      tag_on_failure => []
    }
  }

  else if (([details] =~ /(?i)^\\s*(select|update|insert|delete)\\b/) or ([message] =~ /(?i)^\\s*(select|update|insert|delete)\\b/)) {
    mutate {
      replace => {
        "log_family" => "sql_persistence"
        "event_type" => "sql_raw"
      }
    }

    if [details] =~ /(?i)^\\s*(select|update|insert|delete)\\b/ {
      mutate { replace => { "query_text" => "%{details}" } }
    } else {
      mutate { replace => { "query_text" => "%{message}" } }
    }
  }

  else if [details] =~ /^Result Size:\s*\d+/ {
    mutate {
      replace => {
        "log_family" => "sql_persistence"
        "event_type" => "result_size"
      }
    }

    grok {
      match => { "details" => "^Result Size:\\s*%{NUMBER:result_size:int}$" }
      tag_on_failure => []
    }
  }

  else if [details] =~ /^Update Count:\s*\d+/ {
    mutate {
      replace => {
        "log_family" => "sql_persistence"
        "event_type" => "update_count"
      }
    }

    grok {
      match => { "details" => "^Update Count:\\s*%{NUMBER:update_count:int}$" }
      tag_on_failure => []
    }
  }

  else if [details] =~ /^Data Source:\s*/ {
    mutate {
      replace => {
        "log_family" => "sql_persistence"
        "event_type" => "data_source"
      }
    }

    grok {
      match => { "details" => "^Data Source:\\s*%{GREEDYDATA:data_source}$" }
      tag_on_failure => []
    }

    mutate { strip => [ "data_source" ] }
  }

  #
  # Generic trace/info
  #
  else if [log_level] == "trace" {
    mutate {
      replace => {
        "log_family" => "generic_application"
        "event_type" => "trace"
      }
    }
  }

  else if [log_level] == "info" {
    mutate {
      replace => {
        "log_family" => "generic_application"
        "event_type" => "info"
      }
    }
  }

  #
  # SQL sub-processing
  #
  if [query_text] != "" {
    if [query_text] =~ /^(?i)\s*select\s+/ {
      mutate { replace => { "sql_operation" => "select" } }
      grok {
        match => { "query_text" => "(?i)^\\s*select\\s+.*?\\s+from\\s+%{DATA:sql_table}\\s+.*$" }
        tag_on_failure => []
      }
    } else if [query_text] =~ /^(?i)\s*update\s+/ {
      mutate { replace => { "sql_operation" => "update" } }
      grok {
        match => { "query_text" => "(?i)^\\s*update\\s+%{DATA:sql_table}\\s+set\\s+.*$" }
        tag_on_failure => []
      }
    } else if [query_text] =~ /^(?i)\s*insert\s+/ {
      mutate { replace => { "sql_operation" => "insert" } }
      grok {
        match => { "query_text" => "(?i)^\\s*insert\\s+into\\s+%{DATA:sql_table}\\s+.*$" }
        tag_on_failure => []
      }
    } else if [query_text] =~ /^(?i)\s*delete\s+/ {
      mutate { replace => { "sql_operation" => "delete" } }
      grok {
        match => { "query_text" => "(?i)^\\s*delete\\s+from\\s+%{DATA:sql_table}\\s+.*$" }
        tag_on_failure => []
      }
    }

    if [query_text] =~ /\?/ {
      mutate { add_field => { "query_has_placeholders" => "true" } }
    } else {
      mutate { add_field => { "query_has_placeholders" => "false" } }
    }

    grok {
      match => { "query_text" => ".*mainEntityId_\\s*=\\s*'?(?<main_entity_id>[^'\\)\\s]+)'?.*" }
      tag_on_failure => []
    }

    if [sql_table] =~ /(?i)notif/ {
      mutate { replace => { "sql_entity_family" => "notification" } }
    } else if [sql_table] =~ /(?i)statement/ {
      mutate { replace => { "sql_entity_family" => "statement" } }
    } else if [sql_table] =~ /(?i)request/ {
      mutate { replace => { "sql_entity_family" => "request" } }
    } else if [sql_table] =~ /(?i)batch/ {
      mutate { replace => { "sql_entity_family" => "batch" } }
    } else if [sql_table] =~ /(?i)market/ {
      mutate { replace => { "sql_entity_family" => "market" } }
    } else if [sql_table] =~ /(?i)holding/ {
      mutate { replace => { "sql_entity_family" => "holding" } }
    }

    mutate {
      strip => [ "query_stage", "query_text", "sql_operation", "sql_table", "main_entity_id", "sql_entity_family" ]
      lowercase => [ "sql_operation" ]
    }
  }

  #
  # Scheduler/controller derived fields
  #
  if [thread] =~ /Worker-\d+/ {
    grok {
      match => { "thread" => ".*Worker-(?<worker_id>\d+).*" }
      tag_on_failure => []
    }
  }

  if [controller_name] =~ /com\.vermeg\.services\./ {
    grok {
      match => { "controller_name" => "com\.vermeg\.services\.%{DATA:service_domain}\.ctrl\..*" }
      tag_on_failure => []
    }
    mutate { strip => [ "service_domain" ] }
  }

  #
  # Stable unique document ID for Elasticsearch and PostgreSQL
  #
  ruby {
    code => '
      require "digest"
      parts = [
        event.get("@timestamp"),
        event.get("application_key"),
        event.get("log_level"),
        event.get("log_origin"),
        event.get("thread"),
        event.get("log_family"),
        event.get("event_type"),
        event.get("details"),
        event.get("source_file")
      ].map { |x| x.to_s }

      event.set("source_doc_id", Digest::SHA256.hexdigest(parts.join("|")))
    '
  }

  mutate {
    convert => {
      "worker_id" => "integer"
      "caused_by_count" => "integer"
    }
  }

  if [query_has_placeholders] == "true" {
    mutate { replace => { "query_has_placeholders" => "true" } }
  } else if [query_has_placeholders] == "false" {
    mutate { replace => { "query_has_placeholders" => "false" } }
  }

  mutate {
    strip => [
      "application_name",
      "application_key",
      "application_group",
      "log_level",
      "log_origin",
      "thread",
      "context",
      "details",
      "worker_id"
    ]
    remove_field => [
      "log_month",
      "log_day",
      "log_year",
      "log_time",
      "log_hour",
      "log_minute",
      "log_second",
      "log_millis",
      "log_timestamp_raw",
      "payload",
      "origin_and_thread",
      "details_body"
    ]
  }
}

output {
  elasticsearch {
    id => "es_log_unified_output"
    index => "log-unified-%{[application_key]}-%{+YYYY.MM.dd}"
    document_id => "%{source_doc_id}"
    hosts => ["https://es01:9200"]
    user => "elastic"
    password => "changeme123"
    ssl_enabled => true
    ssl_certificate_authorities => ["/usr/share/logstash/certs/ca/ca.crt"]
  }

  stdout {
    codec => rubydebug
  }
}
