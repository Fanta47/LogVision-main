volumes:
 certs:
   driver: local
 esdata01:
   driver: local
 esdata02:
   driver: local
 esdata03:
   driver: local
 kibanadata:
   driver: local
 logstashdata01:
   driver: local
 uploadsdata:
   driver: local
 pgdata:
   driver: local

networks:
  default:
    name: logvision_elastic
    external: false

services:
 setup:
   image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
   volumes:
     - certs:/usr/share/elasticsearch/config/certs
   user: "0"
   command: >
     bash -c '
       if [ x${ELASTIC_PASSWORD} == x ]; then
         echo "Set the ELASTIC_PASSWORD environment variable in the .env file";
         exit 1;
       elif [ x${KIBANA_PASSWORD} == x ]; then
         echo "Set the KIBANA_PASSWORD environment variable in the .env file";
         exit 1;
       fi;
       if [ ! -f config/certs/ca.zip ]; then
         echo "Creating CA";
         bin/elasticsearch-certutil ca --silent --pem -out config/certs/ca.zip;
         unzip config/certs/ca.zip -d config/certs;
       fi;
       if [ ! -f config/certs/certs.zip ]; then
         echo "Creating certs";
         echo -ne \
         "instances:\n"\
         "  - name: es01\n"\
         "    dns:\n"\
         "      - es01\n"\
         "      - localhost\n"\
         "    ip:\n"\
         "      - 127.0.0.1\n"\
         "  - name: es02\n"\
         "    dns:\n"\
         "      - es02\n"\
         "      - localhost\n"\
         "    ip:\n"\
         "      - 127.0.0.1\n"\
         "  - name: es03\n"\
         "    dns:\n"\
         "      - es03\n"\
         "      - localhost\n"\
         "    ip:\n"\
         "      - 127.0.0.1\n"\
         "  - name: kibana\n"\
         "    dns:\n"\
         "      - kibana\n"\
         "      - localhost\n"\
         "    ip:\n"\
         "      - 127.0.0.1\n"\
         > config/certs/instances.yml;
         bin/elasticsearch-certutil cert --silent --pem -out config/certs/certs.zip --in config/certs/instances.yml --ca-cert config/certs/ca/ca.crt --ca-key config/certs/ca/ca.key;
         unzip config/certs/certs.zip -d config/certs;
       fi;
       echo "Setting file permissions"
       chown -R root:root config/certs;
       find . -type d -exec chmod 750 \{\} \;;
       find . -type f -exec chmod 640 \{\} \;;
       echo "Waiting for Elasticsearch availability";
       until curl -s --cacert config/certs/ca/ca.crt https://es01:9200 | grep -q "missing authentication credentials"; do sleep 30; done;
       echo "Setting kibana_system password";
       until curl -s -X POST --cacert config/certs/ca/ca.crt -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" https://es01:9200/_security/user/kibana_system/_password -d "{\"password\":\"${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do sleep 10; done;
       echo "All done!";
     '
   healthcheck:
     test: ["CMD-SHELL", "[ -f config/certs/es01/es01.crt ]"]
     interval: 1s
     timeout: 5s
     retries: 120

 es01:
   depends_on:
     setup:
       condition: service_healthy
   image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
   labels:
     co.elastic.logs/module: elasticsearch
   volumes:
     - certs:/usr/share/elasticsearch/config/certs
     - esdata01:/usr/share/elasticsearch/data
   ports:
     - 9211:9200
   environment:
     - node.name=es01
     - cluster.name=${CLUSTER_NAME}
     - cluster.initial_master_nodes=es01,es02,es03
     - discovery.seed_hosts=es02,es03
     - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
     - bootstrap.memory_lock=true
     - xpack.security.enabled=true
     - xpack.security.http.ssl.enabled=true
     - xpack.security.http.ssl.key=certs/es01/es01.key
     - xpack.security.http.ssl.certificate=certs/es01/es01.crt
     - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
     - xpack.security.transport.ssl.enabled=true
     - xpack.security.transport.ssl.key=certs/es01/es01.key
     - xpack.security.transport.ssl.certificate=certs/es01/es01.crt
     - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
     - xpack.security.transport.ssl.verification_mode=certificate
     - xpack.license.self_generated.type=${LICENSE}
   mem_limit: ${ES_MEM_LIMIT}
   cpus: 2.0
   ulimits:
     memlock:
       soft: -1
       hard: -1
   healthcheck:
     test:
       [
         "CMD-SHELL",
         "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
       ]
     interval: 10s
     timeout: 10s
     retries: 120
   restart: on-failure

 es02:
   depends_on:
     es01:
       condition: service_healthy
   image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
   labels:
     co.elastic.logs/module: elasticsearch
   volumes:
     - certs:/usr/share/elasticsearch/config/certs
     - esdata02:/usr/share/elasticsearch/data
   ports:
     - 9212:9200
   environment:
     - node.name=es02
     - cluster.name=${CLUSTER_NAME}
     - cluster.initial_master_nodes=es01,es02,es03
     - discovery.seed_hosts=es01,es03
     - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
     - bootstrap.memory_lock=true
     - xpack.security.enabled=true
     - xpack.security.http.ssl.enabled=true
     - xpack.security.http.ssl.key=certs/es02/es02.key
     - xpack.security.http.ssl.certificate=certs/es02/es02.crt
     - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
     - xpack.security.transport.ssl.enabled=true
     - xpack.security.transport.ssl.key=certs/es02/es02.key
     - xpack.security.transport.ssl.certificate=certs/es02/es02.crt
     - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
     - xpack.security.transport.ssl.verification_mode=certificate
     - xpack.license.self_generated.type=${LICENSE}
   mem_limit: ${ES_MEM_LIMIT}
   cpus: 2.0
   ulimits:
     memlock:
       soft: -1
       hard: -1
   healthcheck:
     test:
       [
         "CMD-SHELL",
         "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
       ]
     interval: 10s
     timeout: 10s
     retries: 120
   restart: on-failure

 es03:
   depends_on:
     es02:
       condition: service_healthy
   image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
   labels:
     co.elastic.logs/module: elasticsearch
   volumes:
     - certs:/usr/share/elasticsearch/config/certs
     - esdata03:/usr/share/elasticsearch/data
   ports:
     - 9213:9200
   environment:
     - node.name=es03
     - cluster.name=${CLUSTER_NAME}
     - cluster.initial_master_nodes=es01,es02,es03
     - discovery.seed_hosts=es01,es02
     - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
     - bootstrap.memory_lock=true
     - xpack.security.enabled=true
     - xpack.security.http.ssl.enabled=true
     - xpack.security.http.ssl.key=certs/es03/es03.key
     - xpack.security.http.ssl.certificate=certs/es03/es03.crt
     - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
     - xpack.security.transport.ssl.enabled=true
     - xpack.security.transport.ssl.key=certs/es03/es03.key
     - xpack.security.transport.ssl.certificate=certs/es03/es03.crt
     - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
     - xpack.security.transport.ssl.verification_mode=certificate
     - xpack.license.self_generated.type=${LICENSE}
   mem_limit: ${ES_MEM_LIMIT}
   cpus: 2.0
   ulimits:
     memlock:
       soft: -1
       hard: -1
   healthcheck:
     test:
       [
         "CMD-SHELL",
         "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
       ]
     interval: 10s
     timeout: 10s
     retries: 120

 kibana:
   depends_on:
     es01:
       condition: service_healthy
   image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
   labels:
     co.elastic.logs/module: kibana
   volumes:
     - certs:/usr/share/kibana/config/certs
     - kibanadata:/usr/share/kibana/data
   ports:
     - ${KIBANA_PORT}:5601
   environment:
     - SERVERNAME=kibana
     - ELASTICSEARCH_HOSTS=https://es01:9200
     - ELASTICSEARCH_USERNAME=kibana_system
     - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
     - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
     - XPACK_SECURITY_ENCRYPTIONKEY=${ENCRYPTION_KEY}
     - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${ENCRYPTION_KEY}
     - XPACK_REPORTING_ENCRYPTIONKEY=${ENCRYPTION_KEY}
   mem_limit: ${KB_MEM_LIMIT}
   cpus: 1.0
   healthcheck:
     test:
       [
         "CMD-SHELL",
         "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
       ]
     interval: 10s
     timeout: 10s
     retries: 120
   restart: on-failure

 postgres:
   image: postgres:17
   environment:
     - POSTGRES_DB=logs
     - POSTGRES_USER=logs_user
     - POSTGRES_PASSWORD=logs_pass
     - PGDATA=/var/lib/postgresql/data/pgdata
   ports:
     - "55432:5432"
   volumes:
     - ./postgres/init:/docker-entrypoint-initdb.d
     - pgdata:/var/lib/postgresql/data
   healthcheck:
     test: ["CMD-SHELL", "pg_isready -U logs_user -d logs"]
     interval: 10s
     timeout: 5s
     retries: 12
   restart: unless-stopped

 backend:
   build: ./backend
   environment:
     - APP_ENV=docker
     - PG_HOST=postgres
     - PG_PORT=5432
     - PG_DB=logs
     - PG_USER=logs_user
     - PG_PASSWORD=logs_pass
     - UPLOAD_ROOT=/app/uploads/raw
   volumes:
     - uploadsdata:/app/uploads
   ports:
     - "8000:8000"
   depends_on:
     postgres:
       condition: service_healthy
   restart: unless-stopped

 etl_service:
   build: ./etl_service
   environment:
     - ES_URLS=https://es01:9200
     - ES_INDEX=lvlogs-*
     - ES_USERNAME=elastic
     - ES_PASSWORD=changeme123
     - ES_CA_CERT=/certs/ca/ca.crt
     - PG_DSN=postgresql://logs_user:logs_pass@postgres:5432/logs
     - POLL_SECONDS=5
     - BATCH_SIZE=1000
     - PIPELINE_NAME=es_to_pg
     - FULL_SYNC_ON_START=true
   volumes:
     - certs:/certs:ro
   depends_on:
     postgres:
       condition: service_healthy
     es01:
       condition: service_healthy
     es02:
       condition: service_healthy
     es03:
       condition: service_healthy
   restart: unless-stopped

 logstash:
   depends_on:
     es01:
       condition: service_healthy
   image: docker.elastic.co/logstash/logstash:${STACK_VERSION}
   labels:
     co.elastic.logs/module: logstash
   user: root
   volumes:
     - logstashdata01:/usr/share/logstash/data
     - certs:/usr/share/logstash/certs
     - uploadsdata:/usr/share/logstash/uploads
     - ./uploads:/usr/share/logstash/host_uploads
     - ./logstash/pipeline:/usr/share/logstash/pipeline
   environment:
     - NODE_NAME="logstash"
     - xpack.monitoring.enabled=false
     - ELASTIC_USER=elastic
     - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
     - ELASTIC_HOSTS=https://es01:9200
     - LS_JAVA_OPTS=-Xms512m -Xmx512m
   command: logstash -f /usr/share/logstash/pipeline/logstash.conf
   ports:
     - "5044:5044/udp"
   mem_limit: ${LS_MEM_LIMIT}
   cpus: 1.5
   healthcheck:
     test: ["CMD-SHELL", "curl -s -f http://127.0.0.1:9600/_node/pipelines > /dev/null"]
     start_period: 90s
     interval: 10s
     timeout: 10s
     retries: 12
   restart: on-failure
