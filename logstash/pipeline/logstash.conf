input {
  file {
    id => "raw_log_input"
    path => ["/usr/share/logstash/uploads/raw/*/*/*"]
    exclude => ["*.zip","*.gz","*.png","*.jpg","*.jpeg","*.pdf","*.7z","*.tar"]
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_raw"
    mode => "tail"
    discover_interval => 2
    stat_interval => 1

    codec => multiline {
      pattern => "^[A-Z][a-z]{2}\s+\d{1,2},\s+\d{4}\s+\d{2}:\d{2}:\d{2}:\d{3}\s+\|"
      negate => true
      what => "previous"
      auto_flush_interval => 2
    }
  }
}

filter {
  mutate {
    add_field => {
      "source_path" => "%{[log][file][path]}"
    }
  }

  grok {
    match => {
      "source_path" => ".*/raw/%{DATA:application_key}/%{DATA:component_name}/%{DATA:stored_file_name}$"
    }
    tag_on_failure => ["path_parse_failed"]
  }

  grok {
    match => {
      "message" => "^(?<event_timestamp_raw>[A-Z][a-z]{2}\s+\d{1,2},\s+\d{4}\s+\d{2}:\d{2}:\d{2}:\d{3})\s+\|(?<platform>[^:]+)\s*:\s*(?<log_level>[A-Z]+)\s*\|(?<log_origin>[^\[]+)-\[(?<thread_name>[^\]]+)\]:\s*(?<context>[^:]+:[^:]+):\s*(?<details>[\s\S]*)$"
    }
    tag_on_failure => ["palmyra_parse_failed"]
  }

  if [log_origin] {
    mutate {
      copy => {
        "log_origin" => "log_origin_original"
      }
    }
  }

  mutate {
    lowercase => ["application_key", "component_name", "log_origin", "log_level"]
  }

  if ![details] or [details] == "%{details_body}" {
    mutate {
      replace => {
        "details" => "%{message}"
      }
      add_tag => ["details_fallback_message"]
    }
  }

  if [component_name] =~ /sla/ or [log_origin] =~ /sla/ {
    mutate {
      replace => {
        "log_family" => "sla"
        "event_type" => "sla_event"
        "parse_status" => "parsed"
        "parse_confidence" => "0.90"
      }
    }

    grok {
      match => {
        "details" => "SLA Class Name=%{DATA:sla_class_name};"
      }
      tag_on_failure => []
    }

    if [details] =~ /NOT FOUND/ {
      mutate {
        replace => {
          "event_type" => "sla_not_found"
          "sla_status" => "NOT_FOUND"
        }
      }
    } else if [details] =~ /result=\[pk=/ {
      mutate {
        replace => {
          "event_type" => "sla_found"
          "sla_status" => "FOUND"
        }
      }

      grok {
        match => {
          "details" => "result=\[pk=%{NUMBER:sla_result_pk}\]"
        }
        tag_on_failure => []
      }
    }
  }

  else if [component_name] =~ /persistence/ or [log_origin] =~ /persistence/ {
    mutate {
      replace => {
        "log_family" => "persistence"
        "event_type" => "persistence_event"
        "parse_status" => "parsed"
        "parse_confidence" => "0.85"
      }
    }

    if [details] =~ /The query before setting its parameters/ or [details] =~ /the query before setting its parameters/ {
      mutate {
        replace => {
          "query_stage" => "before_parameters"
          "event_type" => "sql_query_before"
        }
      }
    }

    if [details] =~ /The query after setting its parameters/ or [details] =~ /the query after setting its parameters/ {
      mutate {
        replace => {
          "query_stage" => "after_parameters"
          "event_type" => "sql_query_after"
        }
      }
    }

    grok {
      match => {
        "details" => [
          "(?<sql_operation>[sS][eE][lL][eE][cC][tT])\s+[\s\S]*?\s+[fF][rR][oO][mM]\s+(?<table_name>[A-Za-z0-9_$]+)",
          "(?<sql_operation>[uU][pP][dD][aA][tT][eE])\s+(?<table_name>[A-Za-z0-9_$]+)",
          "(?<sql_operation>[iI][nN][sS][eE][rR][tT])\s+[iI][nN][tT][oO]\s+(?<table_name>[A-Za-z0-9_$]+)",
          "(?<sql_operation>[dD][eE][lL][eE][tT][eE])\s+[fF][rR][oO][mM]\s+(?<table_name>[A-Za-z0-9_$]+)"
        ]
      }
      tag_on_failure => []
    }

    if [sql_operation] {
      mutate {
        uppercase => ["sql_operation"]
        add_field => {
          "sql_query" => "%{details}"
        }
      }
    }

    grok {
      match => {
        "details" => "Result Size:\s*%{NUMBER:result_size:int}"
      }
      tag_on_failure => []
    }

    if [result_size] {
      mutate {
        replace => {
          "event_type" => "sql_result_size"
        }
      }
    }

    grok {
      match => {
        "details" => "Update Count:\s*%{NUMBER:update_count:int}"
      }
      tag_on_failure => []
    }

    if [update_count] {
      mutate {
        replace => {
          "event_type" => "sql_update_count"
        }
      }
    }

    grok {
      match => {
        "details" => "Data Source:\s*%{GREEDYDATA:data_source}"
      }
      tag_on_failure => []
    }

    if [data_source] {
      mutate {
        replace => {
          "event_type" => "sql_data_source"
        }
      }
    }
  }

  else if [component_name] =~ /lifecycle/ or [log_origin] =~ /lifecycle/ {
    mutate {
      replace => {
        "log_family" => "lifecycle"
        "event_type" => "lifecycle_event"
        "parse_status" => "parsed"
        "parse_confidence" => "0.85"
      }
    }

    if [details] =~ /Entering\s*:\s*fireEvent/ {
      mutate {
        replace => {
          "event_type" => "lifecycle_fire_event"
        }
      }

      grok {
        match => {
          "details" => "with code \[%{DATA:object_pk}\].*,\s*%{DATA:lifecycle_event_name}\]?$"
        }
        tag_on_failure => []
      }
    }

    if [details] =~ /The object is/ {
      mutate {
        replace => {
          "event_type" => "lifecycle_object_snapshot"
        }
      }

      grok {
        match => {
          "details" => "pk=%{NUMBER:object_pk}"
        }
        tag_on_failure => []
      }
    }
  }

  else if [component_name] =~ /basicstruct/ or [log_origin] =~ /basicstruct/ {
    mutate {
      replace => {
        "log_family" => "basicstruct"
        "event_type" => "basicstruct_event"
        "parse_status" => "parsed"
        "parse_confidence" => "0.85"
      }
    }

    if [details] =~ /NoClassDefFoundError/ {
      mutate {
        replace => {
          "event_type" => "basicstruct_no_class_def_found"
        }
      }
    }

    if [details] =~ /ClassNotFoundException/ {
      mutate {
        replace => {
          "event_type" => "basicstruct_class_not_found"
        }
      }
    }
  }

  else if [component_name] =~ /init/ or [log_origin] =~ /init/ {
    mutate {
      replace => {
        "log_family" => "init"
        "event_type" => "init_event"
        "parse_status" => "parsed"
        "parse_confidence" => "0.80"
      }
    }

    if [details] =~ /ChangeListenerEvent/ or [details] =~ /CacheName/ {
      mutate {
        replace => {
          "event_type" => "init_cache_change"
        }
      }
    }

    grok {
      match => {
        "details" => "Result Size:\s*%{NUMBER:result_size:int}"
      }
      tag_on_failure => []
    }

    if [result_size] {
      mutate {
        replace => {
          "event_type" => "init_result_size"
        }
      }
    }
  }

  else if [log_level] =~ /error/ or [log_level] =~ /severe/ or [details] =~ /Exception/ or [details] =~ /Error/ or [details] =~ /Caused by/ {
    mutate {
      replace => {
        "log_family" => "application_error"
        "event_type" => "technical_error"
        "parse_status" => "parsed"
        "parse_confidence" => "0.90"
      }
    }

    grok {
      match => {
        "details" => "(?<exception_class>[A-Za-z0-9_.$]+(?:Exception|Error))"
      }
      tag_on_failure => []
    }

    mutate {
      add_field => {
        "error_message" => "%{details}"
        "stack_trace" => "%{details}"
      }
    }
  }

  else {
    mutate {
      replace => {
        "log_family" => "generic_application"
        "event_type" => "info"
        "parse_status" => "parsed"
        "parse_confidence" => "0.50"
      }
    }
  }

  date {
    match => ["event_timestamp_raw", "MMM d, yyyy HH:mm:ss:SSS", "MMM dd, yyyy HH:mm:ss:SSS"]
    target => "@timestamp"
    timezone => "UTC"
    tag_on_failure => ["timestamp_parse_failed"]
  }
}

output {
  elasticsearch {
    index => "lvlogs-%{[application_key]}-%{[component_name]}-%{+YYYY.MM.dd}"
    hosts => ["${ELASTIC_HOSTS}"]
    user => "${ELASTIC_USER}"
    password => "${ELASTIC_PASSWORD}"
    ssl_enabled => true
    ssl_certificate_authorities => ["/usr/share/logstash/certs/ca/ca.crt"]
  }

  stdout {
    codec => rubydebug
  }
}